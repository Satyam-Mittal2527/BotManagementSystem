{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="adminHMD professional admin dashboard template">
    <title>SANIMA BANK | View Workflow</title>
    <link rel="icon" type="image/png" href="{% static 'assets/images/favicon.png' %}">
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/bootstrap-icons/bootstrap-icons.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>

<body>
    <div class="admin-shell">
        <div class="sidebar-backdrop" data-sidebar-close></div>

        <aside class="admin-sidebar" id="adminSidebar" aria-label="Main navigation">
            <div class="sidebar-header">
                <a class="brand-mark" href="/" aria-label="adminHMD dashboard">
                    <div class="brand-logo">
                        <img class="company-logo" src="{% static 'assets/images/logo.jpeg' %}" alt="Sanima Logo">
                    </div>
                    <span class="brand-copy">
                        <span class="brand-title">SANIMA BMS</span>
                        <span class="brand-subtitle">SANIMA BMS</span>
                    </span>
                </a>
            </div>

            <nav class="sidebar-nav">

                <a class="nav-link" href="/botPage">
                    <span class="nav-icon"><i class="bi bi-people" aria-hidden="true"></i></span>
                    <span class="nav-text">Bots</span>
                </a>
                <a class="nav-link" href="/addBot">
                    <span class="nav-icon"><i class="bi bi-person-plus" aria-hidden="true"></i></span>
                    <span class="nav-text">Add Bot</span>
                </a>

                <a class="nav-link" href="/users">
                    <span class="nav-icon"><i class="bi bi-bar-chart-line" aria-hidden="true"></i></span>
                    <span class="nav-text">Users</span>
                </a>
                <a class="nav-link" href="/EditBot">
                    <span class="nav-icon"><i class="bi bi-file-earmark-code"></i></span>
                    <span class="nav-text">Edit Bots</span>
                </a>
                <a class="nav-link" href="/DeleteBot">
                    <span class="nav-icon"><i class="bi bi-trash" aria-hidden="true"></i></span>
                    <span class="nav-text">Delete Bots</span>
                </a>
                <a class="nav-link" href="/workflowBuilder">
                    <span class="nav-icon"><i class="bi bi-diagram-3" aria-hidden="true"></i></span>
                    <span class="nav-text">Workflow Builder</span>
                </a>
                <a class="nav-link active" href="/workflowPage">
                    <span class="nav-icon"><i class="bi bi-bezier" aria-hidden="true"></i></span>
                    <span class="nav-text">WorkFlow Page</span>
                </a>
                <a class="nav-link" href="/Deletedworkflows">
                    <span class="nav-icon"><i class="bi bi-trash" aria-hidden="true"></i></span>
                    <span class="nav-text">Deleted Workflows</span>
                </a>

        </aside>

        <div class="admin-main">

            <div class="container-fluid px-3 px-lg-4 py-4">
                <div class="page-heading">
                    <div class="page-heading-copy">
                        <span class="page-icon"><i class="bi bi-person-plus" aria-hidden="true"></i></span>
                        <div>
                            <p class="eyebrow mb-1">Bots Management</p>
                            <h1 class="h3 mb-1">View Workflow</h1>
                        </div>
                    </div>
                    <div class="heading-actions"><a class="btn btn-outline-secondary btn-sm" href="/botPage"><i
                                class="bi bi-arrow-left" aria-hidden="true"></i> Back to Bots</a></div>
                </div>

                <section class="row g-3" style="display: flex; flex-direction: row; flex-wrap:nowrap;">

                    <!-- File Explorer -->
                    <div class="card p-3" style="width: fit-content; height: fit-content;">

                        <h5>Files</h5>

                        <div class="list-group">
                            {% for file in files %}
                            <button type="button" class="list-group-item list-group-item-action file-btn"
                                data-file="{{ file.path }}">

                                <span style="font-family: monospace;">

                                    {% for i in "x"|rjust:file.depth %}
                                    &nbsp;&nbsp;&nbsp;
                                    {% endfor %}

                                    {% if file.type == "folder" %}
                                    <i class="bi bi-folder-fill text-warning"></i>
                                    {% else %}
                                    <i class="bi bi-file-earmark-code"></i>
                                    {% endif %}

                                    {{ file.name }}

                                </span>

                            </button>
                            {% endfor %}
                        </div>
                    </div>

                    <!-- Code -->
                    <form id="EditBotForm" style="width: 70%;">

                        <input type="hidden" id="CurrentFile" value="{{ selected_file }}">

                        <div class="mb-3">
                            <label class="form-label">Workflow Name</label>

                            <input class="form-control" id="BotName" type="text" value="{{bot_name}}" readonly>
                        </div>

                        <div class="mb-3">
                            <textarea class="form-control font-monospace" id="BotCode" style="
                width:100%;
                height:700px;
                font-size:15px;
                resize:vertical;
            ">{{code}}</textarea>

                        </div>

                        <button class="btn btn-primary" type="submit">
                            Edit Workflow
                        </button>

                    </form>

                </section>
            </div>
            </main>

            <footer class="admin-footer">
                <div class="container-fluid px-3 px-lg-4">
                    <span>Copyright 2026 SANIMA BMS</span>
                </div>
            </footer>
        </div>
    </div>

    <script src="{% static 'assets/js/ViewWorkflow.js' %}"></script>
    <script src="{% static 'assets/js/main.js' %}"></script>
    <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>
</body>

</html>
