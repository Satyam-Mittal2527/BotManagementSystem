{% load static %}
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="adminHMD professional admin dashboard template">
    <title>SANIMA| Bot Page</title>
    <link rel="icon" type="image/png" href="{% static 'assets/images/favicon.png' %}">
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/bootstrap-icons/bootstrap-icons.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">

    <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>
</head>

<body>
    {% csrf_token %}
    <div class="admin-shell">
        <div class="sidebar-backdrop" data-sidebar-close></div>

        <aside class="admin-sidebar" id="adminSide">
            <div class="sidebar-header">
                <a class="brand-mark" href="/" aria-label="adminHMD dashboard">
                    <div class="brand-logo">
                        <img class="company-logo" src="{% static 'assets/images/logo.jpeg' %}" alt="Sanima Logo">
                    </div>
                    <span class="brand-copy">
                        <span class="brand-title">SANIMA BOT</span>
                        <span class="brand-subtitle">SANIMA BOT</span>
                    </span>
                </a>
            </div>
            <nav class="sidebar-nav">

                <a class="nav-link" href="/botPage" aria-current="page">
                    <span class="nav-icon"><i class="bi bi-people" aria-hidden="true"></i></span>
                    <span class="nav-text">Bots</span>
                </a>
                <a class="nav-link" href="/addBot">
                    <span class="nav-icon"><i class="bi bi-person-plus" aria-hidden="true"></i></span>
                    <span class="nav-text">Add Bot</span>
                </a>

                <a class="nav-link" href="/users">
                    <span class="nav-icon"><i class="bi bi-bar-chart-line" aria-hidden="true"></i></span>
                    <span class="nav-text">Users</span>
                </a>
                <a class="nav-link" href="/EditBot">
                    <span class="nav-icon"><i class="bi bi-file-earmark-code"></i></span>
                    <span class="nav-text">Edit Bots</span>
                </a>
                <a class="nav-link" href="/DeleteBot">
                    <span class="nav-icon"><i class="bi bi-ui-checks-grid" aria-hidden="true"></i></span>
                    <span class="nav-text">Delete Bots</span>
                </a>
                <a class="nav-link active" href="/workflowBuilder">
                    <span class="nav-icon"><i class="bi bi-ui-checks-grid" aria-hidden="true"></i></span>
                    <span class="nav-text">Workflow Builderr</span>
                </a>
                <a class="nav-link" href="/workflowPage">
                    <span class="nav-icon"><i class="bi bi-ui-checks-grid" aria-hidden="true"></i></span>
                    <span class="nav-text">WorkFlow Page</span>
                </a>

        </aside>

        <div class="admin-main">


            <main class="dashboard-content">

                </section>

                <section class="panel mt-3">
                    <div id="sidebar" style="display: flex; gap: 2px; flex-direction: column;">

                        <h2>Nodes</h2>
                        <label for="WorkFlow Name"> Workflow Name
                        <input id="Workflow_name" type="text">
                        </label>
                        
                        <div class="node drag-drawflow" draggable="true" ondragstart="drag(event)" data-node="script">

                            Drag the Script Node

                        </div>

                        <button onclick="saveWorkflow()">

                            Save Workflow

                        </button>

                    </div>
                      DRAG HERE
                    <div id="drawflow" style="width: 100%; height:600px;">
                      
                    </div>
                </section>
        </main>

        <footer class="admin-footer">
            <div class="container-fluid px-3 px-lg-4">
                <span>Copyright 2026 SANIMA BOT.</span>
            </div>
        </footer>
    </div>
    </div>
    <script src="{% static 'assets/js/workflow.js' %}"></script>
    <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'assets/js/main.js' %}"></script>

</body>

</html>
