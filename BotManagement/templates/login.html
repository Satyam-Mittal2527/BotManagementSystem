<form method="POST">

    {% csrf_token %}

    <div>
        <label>Username</label>
        <input type="text" name="username" required>
    </div>

    <div>
        <label>Password</label>
        <input type="password" name="password" required>
    </div>

    <button type="submit">
        Login
    </button>
    <a href="/logout" class="btn btn-danger">
        <i class="bi bi-box-arrow-right"></i>
        Logout
    </a>
    {% if error %}
    <p>{{error}}</p>
    {% endif %}

</form>
