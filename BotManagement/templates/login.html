{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANIMA BANK | Auth</title>
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>

<body>
    <div class="auth-body">
        <div class="auth-page">
            <div class="auth-card">
                <div class="auth-brand">
                    <div class="brand-logo">
                        <img class="company-logo" src="{% static 'assets/images/logo.jpeg' %}" alt="Sanima Logo">
                    </div>
                    <span>
                        <strong>SanimaBank</strong>
                        <small>Authentication portal</small>
                    </span>
                </div>

                <form method="POST" class="mt-2">
                    {% csrf_token %}

                    {% if error %}
                    <div class="mb-3">
                        <div class="text-danger" role="alert">{{ error }}</div>
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input id="id_username" type="text" name="username" required class="form-control"
                            placeholder="Enter username">
                    </div>

                    <div class="mb-3">
                        <label for="id_password" class="form-label">Password</label>
                        <input id="id_password" type="password" name="password" required class="form-control"
                            placeholder="Enter password">
                    </div>
                    <div style="display: flex; flex-direction: row; justify-content: center; gap: 3px;">
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Login</button>
                        </div>

                    </div>
            </div>
            </form>


        </div>
    </div>
    </div>
</body>

</html>
